# Model arguments
model_name_or_path: Qwen/Qwen2.5-Math-7B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: DigitalLearningGmbH/MATH-lighteval
dataset_config: default
system_prompt: "You are a helpful AI Assistant, designed to provided well-reasoned and detailed responses. You FIRST think about the reasoning process as an internal monologue and then provide the user with the answer. The reasoning process MUST BE enclosed within <think> and </think> tags."

# GRPO trainer config
bf16: true
use_vllm: false
vllm_device: auto
vllm_gpu_memory_utilization: 0.7
do_eval: false
eval_strategy: steps
eval_steps: 1
save_strategy: steps
save_steps: 1
save_total_limit: 2
eval_dataset_ratio: 0.06
load_best_model_at_end: true
metric_for_best_model: accuracy_reward
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen-2.5-7B-RL-NoBaseline-2-1e-05-24-Short
hub_strategy: every_save
learning_rate: 1.0e-05
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 1024
max_steps: -1
num_generations: 8
num_train_epochs: 0.125 #  Using 1 / num_generations
output_dir: /scratch-ssd/lucelo/max-ent-llms/data/Qwen-2.5-7B-RL-NoBaseline-2-1e-05-24-Short
overwrite_output_dir: true
per_device_eval_batch_size: 25 # Keep it 25 to evenly divide by GPUs and not mess up gather
per_device_train_batch_size: 24
push_to_hub: true
report_to:
- wandb
reward_funcs:
- accuracy
- format
# - embedding_entropy # Turned off for evaluation
- missing_response
- answer_logprob
- length
token_entropy_reduction: mean
embedding_entropy_reduction: mean # use pca? (mean, max, sum)
embedding_entropy_similarity: cosine # cosine, (pairwise similarity)
embedding_entropy_token: last # last, mean, concat
# embedding_entropy_hidden_state_reduction: (-1, 100) # concat layer idxs in this range # TODO could mean pool too
reward_weights:
- 1.0
- 1.0
- 0.0 # to be tuned
# - 0.0
- 0.0
- 0.0
seed: 42
warmup_ratio: 0.1
wandb_project: 'MaxEntLLMs'
wandb_entity: 'max-ent-llms'
trainer: GRPONoBaselineTrainer